<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Mahaveer Handloom</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <style>
        body { background: var(--bg-warm); padding: 40px 20px; }
        .dashboard-layout { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .admin-container { background: var(--white); padding: 40px; border-radius: var(--border-radius-xl); box-shadow: var(--shadow-soft); align-self: start; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--secondary); }
        input[type="text"], input[type="file"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 1rem; }
        textarea { height: 100px; resize: vertical; }
        .btn-submit { width: 100%; margin-top: 20px; }
        #statusMessage { margin-top: 20px; font-weight: 600; text-align: center; }
        .success { color: green; }
        .error { color: red; }
        
        .products-container { background: var(--white); padding: 40px; border-radius: var(--border-radius-xl); box-shadow: var(--shadow-soft); max-height: 85vh; overflow-y: auto;}
        .product-item { display: flex; gap: 15px; padding: 15px; border-bottom: 1px solid #eee; align-items: center; }
        .product-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
        .product-info { flex: 1; }
        .product-info h4 { margin: 0 0 5px; color: var(--secondary); font-size: 1.1rem; }
        .product-info span { color: var(--primary); font-weight: 600; font-family: 'Outfit'; }
        .product-actions { display: flex; gap: 10px; }
        .btn-edit, .btn-delete { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Inter'; font-weight: 600; font-size: 0.85rem;}
        .btn-edit { background: var(--bg-warm); color: var(--text-main); }
        .btn-delete { background: #ffebee; color: #d32f2f; }
        .top-bar { max-width: 1200px; margin: 0 auto 20px; display: flex; justify-content: space-between; align-items: center; }
        .top-bar h1 { font-family: 'Outfit'; color: var(--secondary); }
        
        @media (max-width: 900px) {
            .dashboard-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <div class="top-bar">
        <h1>Admin <span>Dashboard</span></h1>
        <button id="logoutBtn" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.9rem;">Logout</button>
    </div>

    <div class="dashboard-layout">
        <!-- Add / Edit Form -->
        <div class="admin-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 class="section-title" style="margin-bottom: 0; font-size: 2rem;" id="formTitle">Upload <span>New Product</span></h2>
                <button id="cancelEditBtn" class="btn btn-secondary" style="padding: 6px 12px; font-size: 0.8rem; display: none;">Cancel Edit</button>
            </div>
            <form id="uploadForm">
                <input type="hidden" id="editProductId" value="">
            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" name="name" required placeholder="e.g. Premium Silk Bedsheet">
            </div>
            
            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" required placeholder="e.g. Bedsheets">
            </div>
            
            <div class="form-group">
                <label for="price">Price</label>
                <input type="text" id="price" name="price" required placeholder="e.g. ₹1200">
            </div>
            
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" required placeholder="Luxurious handloom product..."></textarea>
            </div>
            
            <div class="form-group">
                <label for="image">Upload Product Image <span id="imageHint" style="font-size:0.8rem; font-weight:normal; color:#888;"></span></label>
                <input type="file" id="image" name="image" accept="image/*" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-submit" id="submitBtn">Upload Product</button>
        </form>
        <div id="statusMessage"></div>
    </div>

    <!-- Manage Products List -->
    <div class="products-container">
        <h2 class="section-title" style="margin-bottom: 2rem; font-size: 2rem; text-align: left;">Manage <span>Products</span></h2>
        <div id="adminProductList">
            <p>Loading products...</p>
        </div>
    </div>
    </div>

    <script>
        // Cursor Logic
        const cursor = document.querySelector('.cursor');
        const cursorFollower = document.querySelector('.cursor-follower');
        if (cursor && cursorFollower) {
            let mouseX = 0, mouseY = 0, followerX = 0, followerY = 0;
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX; mouseY = e.clientY;
                cursor.style.left = `${mouseX}px`; cursor.style.top = `${mouseY}px`;
            });
            function renderCursor() {
                followerX += (mouseX - followerX) * 0.15; followerY += (mouseY - followerY) * 0.15;
                cursorFollower.style.left = `${followerX}px`; cursorFollower.style.top = `${followerY}px`;
                requestAnimationFrame(renderCursor);
            }
            requestAnimationFrame(renderCursor);
            
            function attachCursorHover() {
                document.querySelectorAll('button, a, input, textarea, .product-item').forEach(el => {
                    if (el.dataset.cursorAttached) return;
                    el.addEventListener('mouseenter', () => { cursor.classList.add('hover'); cursorFollower.classList.add('hover'); });
                    el.addEventListener('mouseleave', () => { cursor.classList.remove('hover'); cursorFollower.classList.remove('hover'); });
                    el.dataset.cursorAttached = 'true';
                });
            }
            attachCursorHover();
        }

        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            window.location.href = '/login.html';
        });

        const form = document.getElementById('uploadForm');
        const statusMsg = document.getElementById('statusMessage');
        const submitBtn = document.getElementById('submitBtn');
        const formTitle = document.getElementById('formTitle');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const editProductId = document.getElementById('editProductId');
        const imageInput = document.getElementById('image');
        const imageHint = document.getElementById('imageHint');

        // Fetch products and render list
        async function fetchAdminProducts() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                
                const listEl = document.getElementById('adminProductList');
                if (products.length === 0) {
                    listEl.innerHTML = '<p>No products found. Add some!</p>';
                    return;
                }

                listEl.innerHTML = products.map(p => `
                    <div class="product-item">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="product-info">
                            <h4>${p.name}</h4>
                            <span>${p.price}</span> | <small>${p.category}</small>
                        </div>
                        <div class="product-actions">
                            <button class="btn-edit" onclick="editProduct('${p._id}')">Edit</button>
                            <button class="btn-delete" onclick="deleteProduct('${p._id}')">Delete</button>
                        </div>
                    </div>
                `).join('');
                
                // Store globally for quick access during edit
                window.adminProducts = products;
                if (typeof attachCursorHover === 'function') setTimeout(attachCursorHover, 100);
            } catch (err) {
                document.getElementById('adminProductList').innerHTML = '<p class="error">Failed to load products.</p>';
            }
        }

        // Initialize Call
        fetchAdminProducts();

        // Handle Delete
        window.deleteProduct = async (id) => {
            if (!confirm('Are you sure you want to delete this product?')) return;
            try {
                const res = await fetch(`/api/products/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    alert('Product deleted successfully');
                    fetchAdminProducts();
                } else {
                    alert('Failed to delete product');
                }
            } catch (err) {
                alert('Network error during deletion');
            }
        };

        // Handle Edit initiation
        window.editProduct = (id) => {
            const product = window.adminProducts.find(p => p._id === id);
            if (!product) return;

            editProductId.value = product._id;
            document.getElementById('name').value = product.name;
            document.getElementById('category').value = product.category;
            document.getElementById('price').value = product.price;
            document.getElementById('description').value = product.description;

            // Image behaves differently on edit
            imageInput.required = false;
            imageHint.textContent = '(Leave empty to keep existing image)';
            
            formTitle.innerHTML = 'Update <span>Product</span>';
            submitBtn.textContent = 'Save Changes';
            cancelEditBtn.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Cancel Edit
        cancelEditBtn.addEventListener('click', (e) => {
            e.preventDefault();
            resetForm();
        });

        function resetForm() {
            form.reset();
            editProductId.value = '';
            imageInput.required = true;
            imageHint.textContent = '';
            formTitle.innerHTML = 'Upload <span>New Product</span>';
            submitBtn.textContent = 'Upload Product';
            cancelEditBtn.style.display = 'none';
        }

        // Form Submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const isEditing = editProductId.value !== '';
            
            statusMsg.textContent = isEditing ? 'Updating product...' : 'Uploading to Cloudinary and MongoDB...';
            statusMsg.className = '';

            try {
                let response;
                
                if (isEditing) {
                    // Update Product (JSON PUT)
                    const updateData = {
                        name: document.getElementById('name').value,
                        category: document.getElementById('category').value,
                        price: document.getElementById('price').value,
                        description: document.getElementById('description').value
                    };
                    
                    response = await fetch(`/api/products/${editProductId.value}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(updateData)
                    });
                } else {
                    // Create Product (FormData POST with image)
                    const formData = new FormData(form);
                    response = await fetch('/api/products', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });
                }

                const data = await response.json();

                if (response.ok) {
                    statusMsg.textContent = isEditing ? 'Product updated successfully!' : 'Product uploaded successfully!';
                    statusMsg.className = 'success';
                    resetForm();
                    fetchAdminProducts(); // Refresh list
                } else {
                    statusMsg.textContent = `Error: ${data.message}`;
                    statusMsg.className = 'error';
                }
            } catch (error) {
                statusMsg.textContent = `Network Error: ${error.message}`;
                statusMsg.className = 'error';
            }
        });
    </script>
</body>
</html>
